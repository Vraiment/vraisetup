- name: VraiShell setup
  hosts: localhost
  tasks:
    - name: Install VraiShell
      block:
        - name: Create directory for VraiShell
          file:
            path: "{{ ansible_facts.env.HOME }}/.local/src/vraishell"
            state: directory
        - name: Clone repository for VraiShell
          git:
            repo: https://github.com/Vraiment/vraishell.git
            dest: "{{ ansible_facts.env.HOME }}/.local/src/vraishell"
        - name: Install VraiShell
          command: "{{ ansible_facts.env.HOME }}/.local/src/vraishell/install.sh"
